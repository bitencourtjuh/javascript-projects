<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada JS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
     <h2>Digite um número!</h2>
     <form id="multiplication-form">
          <div class="form-control">
            <label for="number">Tabuada do:</label>
            <input type="number" name="number" id="number" placeholder="Ex: 3">
          </div>
          <div class="form-control">
            <label for="multiplication">Multiplicar ate:</label>
            <input type="number" name="multiplication" id="multiplication" value="10">
          </div> 
            <input type="submit" value="Calcular">
     </form>
     <div id="multiplication-table">
        <h2 id="multiplication-title">Tabuada do numero: <span></span></h2>
        <div id="multiplication-operations">
            <p>Informe um numero para calcular uma tabuada...</p>
        </div>
    </div>
        
</body>
</html>
